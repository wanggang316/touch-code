# Shared Personas for touch-code user-tests.
#
# Each persona names a stable identity that cases reference by ID. Adding a
# new persona is cheap; reusing one prevents two cases from independently
# inventing slightly different versions of "a typical user" and drifting.
#
# Fields:
#   id          — kebab-case, used in case Preconditions
#   role        — short noun phrase
#   description — what this persona typically does in the app
#   defaults    — environment / setting defaults this persona starts in;
#                 a case may override but should not silently contradict
#
# Format intentionally hand-rollable — no schema validation yet.

personas:
  - id: dev_running_long_task
    role: Developer running long-running terminal work
    description: >
      Runs builds, test suites, AI coding agents, or other long-lived
      commands across multiple panes in multiple worktrees. Routinely
      backgrounds the app and expects to be pulled back when something
      asks for input or a long task finishes. Sample sessions span 2–8
      open panes.
    defaults:
      notifications.inAppEnabled: true
      notifications.systemEnabled: true
      notifications.soundEnabled: true
      notifications.dockBadgeEnabled: true
      notifications.commandFinishedEnabled: true
      notifications.commandFinishedThresholdSec: 10
      notifications.moveNotifiedWorktreeToTop: true
      authStatus: authorized

  - id: settings_tweaker
    role: User adjusting notification preferences
    description: >
      Opens the Settings window, flips toggles, observes the effect on
      live behaviour, and persists their choices. Primary audience for
      the Notifications settings pane's full UX, including the
      disabled-Sound row, the permission alert, and the
      Reveal-rules-in-Finder button.
    defaults:
      authStatus: authorized

  - id: quiet_user
    role: User minimising notification surfaces
    description: >
      Wants notifications only from the panes they care about. Uses the
      per-pane Mute notifications affordance, the command-finished
      threshold knob, and the system-off / sound-off toggles to silence
      common noise sources. Often runs a fast loop of short commands
      that they do not want surfaced.
    defaults:
      notifications.inAppEnabled: true
      notifications.systemEnabled: false
      notifications.soundEnabled: false
      notifications.dockBadgeEnabled: true
      notifications.commandFinishedEnabled: true
      notifications.commandFinishedThresholdSec: 30
      notifications.moveNotifiedWorktreeToTop: false
      authStatus: denied
