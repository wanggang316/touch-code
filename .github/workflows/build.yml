name: build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-lint:
    runs-on: macos-14
    env:
      MISE_HTTP_TIMEOUT: 120
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: jdx/mise-action@v2
        with:
          cache: true
          experimental: true

      - name: Cache Ghostty build
        uses: actions/cache@v4
        with:
          path: apps/mac/.build/ghostty
          key: ghostty-${{ runner.os }}-${{ hashFiles('apps/mac/ThirdParty/ghostty/build.zig.zon', 'apps/mac/scripts/build-ghostty.sh', 'mise.toml') }}

      - run: make mac-generate
      - run: make mac-build-cli
      - run: make mac-build
      - run: make mac-lint
