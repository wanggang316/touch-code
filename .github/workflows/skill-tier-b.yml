name: skill-tier-b

# Tier-B per-agent smoke tests — release gate. Runs on every version tag push.
#
# Each per-agent script degrades gracefully (exit 0 with a warning) when its agent
# CLI is missing. Therefore a *missing* agent never fails the release; a *wrong*
# agent output (skill says `tc worktree new` but agent returns `tc worktreee create`)
# does.
#
# Runner requirements (self-hosted macOS recommended; the hosted macos-14 runner can
# be used too but without claude/codex/pi preinstalled each test will skip):
#   - Xcode 16+
#   - mise + jq + python3
#   - Optional: `claude`, `codex`, `pi` CLIs on PATH
#
# Acceptance: workflow green, even if one or more agents are skipped.
# Operators: before tagging, run `make mac-skill-tier-b` locally against the same
# agent binaries CI will use and confirm all available agents pass.

on:
  push:
    tags:
      - "v*"

concurrency:
  group: skill-tier-b-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  tier-b:
    runs-on: macos-14
    env:
      MISE_HTTP_TIMEOUT: 120
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: jdx/mise-action@v2
        with:
          cache: true
          experimental: true

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.0.app

      - name: Install CI deps
        run: |
          command -v jq >/dev/null || brew install jq

      - name: Build tc CLI
        run: make mac-build-cli

      - name: Probe available agents
        run: |
          echo "claude: $(command -v claude || echo 'not installed')"
          echo "codex:  $(command -v codex  || echo 'not installed')"
          echo "pi:     $(command -v pi     || echo 'not installed')"

      - name: Run Tier-B smoke suite
        run: make mac-skill-tier-b

      - name: Summary
        if: always()
        run: |
          {
            echo "### Tier-B smoke — ${GITHUB_REF_NAME}"
            echo ""
            echo "- commit \`${GITHUB_SHA:0:12}\`"
            echo "- runner \`${RUNNER_NAME:-github-hosted}\`"
            echo ""
            echo "Per-agent scripts under apps/mac/scripts/skill-tier-b-*.sh."
            echo "Missing agent CLIs skip (DEC-5); a wrong answer fails the job."
          } >> "$GITHUB_STEP_SUMMARY"
